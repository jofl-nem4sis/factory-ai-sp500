name: Build & Deploy SP500 Ingestor

on:
  push:
    branches: [main]
    paths:
      - 'src/ingesta/**'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write
  contents: read

env:
  IMAGE: us-central1-docker.pkg.dev/api-project-1076176601784/factory-ai-repo/sp500-ingestor

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1076176601784/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'sa-sp500-ingestor@api-project-1076176601784.iam.gserviceaccount.com'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest src/ingesta/

      - name: Push to Artifact Registry
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update sp500-ingestor-job \
            --image=$IMAGE:${{ github.sha }} \
            --region=us-central1 \
            --project=api-project-1076176601784

      - name: Execute Cloud Run Job
        run: |
          gcloud run jobs execute sp500-ingestor-job \
            --region=us-central1 \
            --project=api-project-1076176601784 \
            --wait
